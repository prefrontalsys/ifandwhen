title: "If and When"
description: "Writing from inside the machine."
url: "https://ifandwhen.org"
baseurl: ""
author:
  name: "Scot Campbell"
  bio: "Product manager and solution architect. Independent researcher. Writing from inside the machine."

# Social / SEO
image: /assets/img/social-card.png
social:
  name: "Scot Campbell"
  links:
    - "https://github.com/prefrontalsys"

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

pagination:
  enabled: true
  per_page: 5
  permalink: "/page/:num/"
  sort_reverse: true
  trail:
    before: 2
    after: 2

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .github
  - vendor

# Collections (optional — for non-post content like notes)
collections:
  notes:
    output: true
    permalink: /notes/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "essay"
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "note"
